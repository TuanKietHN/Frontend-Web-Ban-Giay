<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-sm-12">
      <div class="card hoverable">
        <div class="card-content">
          <span class="card-title center-align mb-4">Đăng Nhập</span>
          
          <form (ngSubmit)="onSubmit()">
            <div class="input-field mb-3">
              <i class="material-icons prefix">person</i>
              <input id="username" type="email" class="validate" [(ngModel)]="username" name="username" required>
              <label for="username">Email đăng nhập</label>
            </div>
            
            <div class="input-field mb-4">
              <i class="material-icons prefix">lock</i>
              <input id="password" type="password" class="validate" [(ngModel)]="password" name="password" required>
              <label for="password">Mật khẩu</label>
            </div>
            
            <div class="center-align">
              <button class="btn waves-effect waves-light blue darken-2 w-100" type="submit" name="action">
                Đăng Nhập
                <i class="material-icons right">send</i>
              </button>
            </div>
            
            <div class="mt-3 center-align">
              <p>Chưa có tài khoản? <a href="#">Đăng ký ngay</a></p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
